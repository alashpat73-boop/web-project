<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المهام - تسجيل الدخول</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="theme-toggle">
            <button id="themeToggle" class="theme-btn">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
        
        <div class="auth-card">
            <div class="auth-header">
                <h1>مرحباً بك</h1>
                <p>سجل دخولك للوصول إلى حسابك</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">اسم المستخدم أو البريد الإلكتروني</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="auth-btn">تسجيل الدخول</button>
            </form>
            
            <div class="auth-footer">
                <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
            </div>
            
            <div id="message" class="message hidden"></div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
