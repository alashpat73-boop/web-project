# ==========================================
# Project Information
# ==========================================

sonar.projectKey=task-manager
sonar.projectName=Task Manager
sonar.projectVersion=2.0

# ==========================================
# Source Code
# ==========================================

sonar.sources=.

# ==========================================
# Encoding
# ==========================================

sonar.sourceEncoding=UTF-8

# ==========================================
# PHP Version
# ==========================================

sonar.php.version=8.2

# ==========================================
# Excluded Files
# ==========================================

sonar.exclusions=\
vendor/**,\
node_modules/**,\
docker/**,\
database/**,\
.git/**,\
.github/**,\
.vscode/**,\
.bolt/**,\
phpmyadmin/**,\
**/*.min.js

# ==========================================
# Test Files
# ==========================================

sonar.tests=

# ==========================================
# SCM
# ==========================================

sonar.scm.provider=git