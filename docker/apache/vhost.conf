# ==========================================
# Apache Virtual Host Configuration
# Project: Task Manager
# ==========================================

<VirtualHost *:80>

    # --------------------------------------
    # معلومات المسؤول (اختياري)
    # --------------------------------------
    ServerAdmin admin@localhost

    # --------------------------------------
    # المجلد الرئيسي للموقع
    # داخل حاوية Docker
    # --------------------------------------
    DocumentRoot /var/www/html

    # ======================================
    # Directory Configuration
    # ======================================
    <Directory /var/www/html>

        # FollowSymLinks:
        # السماح لـ Apache باتباع الروابط الرمزية.
        #
        # لا ننصح باستخدام Indexes في بيئة الإنتاج،
        # لأنه يسمح بعرض محتويات المجلد إذا لم يوجد ملف index.
        #
        # لذلك نستخدم:
        Options FollowSymLinks

        # السماح باستخدام ملفات .htaccess
        AllowOverride All

        # السماح لجميع المستخدمين بالوصول للموقع
        Require all granted

    </Directory>

    # ======================================
    # Security Headers
    # ======================================

    # منع MIME Type Sniffing
    Header always set X-Content-Type-Options "nosniff"

    # الحماية من Clickjacking
    Header always set X-Frame-Options "SAMEORIGIN"

    # التحكم في البيانات المرسلة مع الروابط الخارجية
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Content Security Policy
    # يمكن تشديدها لاحقاً حسب المشروع
    Header always set Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; object-src 'none'; frame-ancestors 'self';"

    # منع الوصول عبر Cross-Origin إلا عند الحاجة
    Header always set Cross-Origin-Embedder-Policy "require-corp"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Resource-Policy "same-origin"

    # تعطيل صلاحيات المتصفح غير الضرورية
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"

    # ======================================
    # Logs
    # ======================================

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>